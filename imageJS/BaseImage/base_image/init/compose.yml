version: "3.9"

services:

  oracle-free:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: ${ORACLE_PWD}

  streamlit:
    build:
      context: ..
      dockerfile: streamlit/Dockerfile
    container_name: streamlit-app
    ports:
      - "8501:8501"

    volumes:
      - ../streamlit:/app:Z
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DSN: ${DB_DSN}

    depends_on:
      - oracle-free

  jupyterlab:
    build:
      context: ..
      dockerfile: jupyter/Dockerfile
    container_name: jupyterlab

    ports:
      - "8888:8888"

    volumes:
      - ../notebooks:/workspace:Z

    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DSN: ${DB_DSN}

    depends_on:
      - oracle-free

